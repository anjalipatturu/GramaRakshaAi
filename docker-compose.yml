version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: gramaraksha-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: gramaraksha
    volumes:
      - mongodb_data:/data/db
    networks:
      - gramaraksha-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gramaraksha-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/gramaraksha?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      - mongodb
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - gramaraksha-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gramaraksha-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
      REACT_APP_NAME: GramaRaksha AI
    depends_on:
      - backend
    networks:
      - gramaraksha-network

volumes:
  mongodb_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local

networks:
  gramaraksha-network:
    driver: bridge
